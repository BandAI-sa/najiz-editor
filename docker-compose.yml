version: "3.9"

services:
  backend:
    image: python:3.12-slim
    container_name: ${COMPOSE_PROJECT_NAME:-najiz}-backend
    working_dir: /app/backend
    command: >
      sh -c "apt-get update && apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libjpeg-dev libopenjp2-7-dev libffi-dev fonts-hosny-amiri &&
      pip install --no-cache-dir -r requirements.txt &&
      uvicorn main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-development-only-key}
    volumes:
      - ./:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-najiz}-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
