name: Main Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: main-deploy-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend system packages
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libjpeg-dev libopenjp2-7-dev libffi-dev fonts-hosny-amiri

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          USE_MEMORY_STORE: "true"
          APP_ENCRYPTION_KEY: test-encryption-key
          LLM_ENABLE: "false"
          LLM_PROVIDER: openai
          APP_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
        run: pytest

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend tests
        run: npm run test:e2e

  deploy-main:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs:
      - backend-tests
      - frontend-tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          set -euo pipefail

          deploy_env_file="$DEPLOY_ENV_FILE"
          if [ -z "$deploy_env_file" ]; then
            deploy_env_file="$STAGING_ENV_FILE"
          fi

          missing=0
          for name in VPS_HOST VPS_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done

          if [ -z "$deploy_env_file" ]; then
            echo "::error::Missing required secret: DEPLOY_ENV_FILE (or legacy STAGING_ENV_FILE)"
            missing=1
          fi

          exit "$missing"

      - name: Prepare deploy bundle
        id: prep
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          set -euo pipefail

          mkdir -p .artifacts

          deploy_env_file="$DEPLOY_ENV_FILE"
          if [ -z "$deploy_env_file" ]; then
            deploy_env_file="$STAGING_ENV_FILE"
          fi

          printf '%s' "$deploy_env_file" > .artifacts/deploy.env

          upsert_env() {
            key="$1"
            value="$2"
            tmp_file="$(mktemp)"
            awk -v key="$key" -v value="$value" '
              BEGIN { updated = 0 }
              $0 ~ ("^" key "=") {
                print key "=" value
                updated = 1
                next
              }
              { print }
              END {
                if (!updated) {
                  print key "=" value
                }
              }
            ' .artifacts/deploy.env > "$tmp_file"
            mv "$tmp_file" .artifacts/deploy.env
          }

          use_memory_store="$(grep '^USE_MEMORY_STORE=' .artifacts/deploy.env | head -n 1 | cut -d= -f2- | tr -d '\r' || true)"
          if printf '%s' "$use_memory_store" | tr '[:upper:]' '[:lower:]' | grep -qx 'true'; then
            echo "::error::DEPLOY_ENV_FILE enables USE_MEMORY_STORE=true. This disables Mongo persistence and clears admin history after restarts. Set USE_MEMORY_STORE=false for deployment."
            exit 1
          fi

          mongodb_uri="$(grep '^MONGODB_URI=' .artifacts/deploy.env | head -n 1 | cut -d= -f2- | tr -d '\r' || true)"
          case "$mongodb_uri" in
            mongodb://localhost*)
              normalized_mongodb_uri="mongodb://host.docker.internal${mongodb_uri#mongodb://localhost}"
              upsert_env MONGODB_URI "$normalized_mongodb_uri"
              echo "Normalized MONGODB_URI from localhost to host.docker.internal for Docker deployment."
              ;;
            mongodb://127.0.0.1*)
              normalized_mongodb_uri="mongodb://host.docker.internal${mongodb_uri#mongodb://127.0.0.1}"
              upsert_env MONGODB_URI "$normalized_mongodb_uri"
              echo "Normalized MONGODB_URI from 127.0.0.1 to host.docker.internal for Docker deployment."
              ;;
          esac

          allowed_hosts="$(grep '^APP_ALLOWED_HOSTS=' .artifacts/deploy.env | head -n 1 | cut -d= -f2- | tr -d '\r' || true)"
          if [ -z "$allowed_hosts" ]; then
            allowed_hosts="$VPS_HOST,localhost,127.0.0.1,backend"
            upsert_env APP_ALLOWED_HOSTS "$allowed_hosts"
            echo "Added APP_ALLOWED_HOSTS for deployment health checks."
          elif ! printf '%s' "$allowed_hosts" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -Fx "$VPS_HOST" >/dev/null; then
            allowed_hosts="$VPS_HOST,$allowed_hosts"
            upsert_env APP_ALLOWED_HOSTS "$allowed_hosts"
            echo "Prepended VPS host to APP_ALLOWED_HOSTS for deployment health checks."
          fi

          backend_port="$(grep '^BACKEND_PORT=' .artifacts/deploy.env | head -n 1 | cut -d= -f2- | tr -d '\r' || true)"
          frontend_port="$(grep '^FRONTEND_PORT=' .artifacts/deploy.env | head -n 1 | cut -d= -f2- | tr -d '\r' || true)"

          if [ -z "$backend_port" ]; then
            backend_port="8000"
          fi

          if [ -z "$frontend_port" ]; then
            frontend_port="3000"
          fi

          echo "backend_port=$backend_port" >> "$GITHUB_OUTPUT"
          echo "frontend_port=$frontend_port" >> "$GITHUB_OUTPUT"

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.venv' \
            --exclude='frontend/node_modules' \
            --exclude='backend/.pytest_cache' \
            --exclude='backend/**/__pycache__' \
            --exclude='frontend/**/__pycache__' \
            -czf .artifacts/release.tgz .

      - name: Install SSH client tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload deploy files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          REMOTE_RELEASE: /tmp/najiz-main-deploy-${{ github.run_id }}.tgz
          REMOTE_ENV: /tmp/najiz-main-deploy-${{ github.run_id }}.env
        run: |
          set -euo pipefail

          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null .artifacts/release.tgz root@"$VPS_HOST":"$REMOTE_RELEASE"
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null .artifacts/deploy.env root@"$VPS_HOST":"$REMOTE_ENV"

      - name: Deploy main stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
          REMOTE_RELEASE: /tmp/najiz-main-deploy-${{ github.run_id }}.tgz
          REMOTE_ENV: /tmp/najiz-main-deploy-${{ github.run_id }}.env
        run: |
          set -euo pipefail

          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@"$VPS_HOST" <<EOF
          set -euo pipefail

          export DEBIAN_FRONTEND=noninteractive
          APP_DIR="${DEPLOY_APP_DIR:-/opt/najiz-editor/pr-staging}"

          if ! command -v docker >/dev/null 2>&1; then
            apt-get update
            apt-get install -y docker.io docker-compose-v2 || apt-get install -y docker.io docker-compose-plugin
            systemctl enable --now docker
          fi

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          else
            echo "Docker Compose is not available on the VPS."
            exit 1
          fi

          mkdir -p "\$APP_DIR"
          rm -rf "\$APP_DIR/app"
          mkdir -p "\$APP_DIR/app"
          tar -xzf "$REMOTE_RELEASE" -C "\$APP_DIR/app"
          cp "$REMOTE_ENV" "\$APP_DIR/app/.env"

          cd "\$APP_DIR/app"
          \$COMPOSE_CMD down --remove-orphans || true
          \$COMPOSE_CMD up -d --build
          \$COMPOSE_CMD ps

          rm -f "$REMOTE_RELEASE" "$REMOTE_ENV"
          EOF

      - name: Verify backend health
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          BACKEND_PORT: ${{ steps.prep.outputs.backend_port }}
        run: |
          set -euo pipefail

          health_url="http://$VPS_HOST:$BACKEND_PORT/api/health"

          for attempt in {1..30}; do
            status_code="$(curl --output /dev/null --silent --show-error --write-out '%{http_code}' "$health_url" || true)"
            if [ "$status_code" = "200" ]; then
              exit 0
            fi

            echo "Attempt $attempt/30: backend health returned ${status_code:-curl_error} for $health_url"
            sleep 10
          done

          echo "::error::Main deployment backend health check failed: $health_url"
          exit 1

      - name: Collect deployment diagnostics
        if: ${{ failure() }}
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
          BACKEND_PORT: ${{ steps.prep.outputs.backend_port }}
        run: |
          set -euo pipefail

          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@"$VPS_HOST" <<EOF
          set -euo pipefail

          APP_DIR="${DEPLOY_APP_DIR:-/opt/najiz-editor/pr-staging}"

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker is not installed on the VPS."
            exit 0
          fi

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          else
            echo "Docker Compose is not available on the VPS."
            exit 0
          fi

          echo "== Docker ps =="
          docker ps -a || true

          if [ ! -d "\$APP_DIR/app" ]; then
            echo "App directory not found: \$APP_DIR/app"
            exit 0
          fi

          cd "\$APP_DIR/app"

          echo "== Compose ps =="
          \$COMPOSE_CMD ps || true

          echo "== Backend logs (tail 200) =="
          \$COMPOSE_CMD logs --tail=200 backend || true

          echo "== Frontend logs (tail 100) =="
          \$COMPOSE_CMD logs --tail=100 frontend || true

          echo "== Safe env subset =="
          grep -E '^(APP_ENV|USE_MEMORY_STORE|APP_ALLOWED_HOSTS|BACKEND_PORT|FRONTEND_PORT|COMPOSE_PROJECT_NAME)=' .env || true

          echo "== Local backend port check =="
          ss -ltnp | grep ":$BACKEND_PORT" || true

          echo "== Local health probe =="
          local_status="\$(curl --output /tmp/najiz-health.out --silent --show-error --write-out '%{http_code}' "http://127.0.0.1:$BACKEND_PORT/api/health" || true)"
          echo "Local health status: \${local_status:-curl_error}"
          cat /tmp/najiz-health.out || true

          if [ "\$local_status" = "200" ]; then
            echo "Backend is healthy on the VPS. External health failure likely points to firewall rules, port exposure, or APP_ALLOWED_HOSTS not matching the public host."
          fi
          EOF
